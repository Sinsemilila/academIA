[databases]
; Phase 1.5 — Session mode for all initially (audit Dify/LiteLLM/n8n upstream
; LISTEN/NOTIFY pending). academia-api asyncpg already patched with
; statement_cache_size=0 → future flip to transaction mode trivial.
academie_db = host=postgres-academie port=5432 dbname=academie_db
litellm_db = host=postgres-academie port=5432 dbname=litellm_db
glitchtip_db = host=postgres-academie port=5432 dbname=glitchtip_db
dify_plugin = host=postgres-academie port=5432 dbname=dify_plugin

[pgbouncer]
listen_addr = 0.0.0.0
listen_port = 6432
auth_type = scram-sha-256
auth_file = /etc/pgbouncer/userlist.txt
pool_mode = session
default_pool_size = 25
max_client_conn = 200
max_db_connections = 150
server_reset_query = DISCARD ALL
ignore_startup_parameters = extra_float_digits,search_path
admin_users = sinse
log_connections = 0
log_disconnections = 0
