services:
  academie-frontend:
    build:
      context: ${WEBAPP_SRC:-.}/frontend
      args:
        BUILD_SHA: ${BUILD_SHA:-dev}
    container_name: academie-frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:3001:3000"
    networks:
      - academie-net-bridge
    depends_on:
      academie-api:
        condition: service_healthy
    env_file:
      - .env   # Phase B4 — PUBLIC_SENTRY_DSN_FRONTEND + SENTRY_DSN_SSR pour SvelteKit
    environment:
      - ORIGIN=https://academia.petit-pont.com
      - PROTOCOL_HEADER=x-forwarded-proto
      - HOST_HEADER=x-forwarded-host
      - ADDRESS_HEADER=x-forwarded-for
      - XFF_DEPTH=1
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://0.0.0.0:3000/').then(r=>{process.exit(r.ok?0:1)}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

  academie-api:
    # Build context = repo root (one level up from webapp/) so Dockerfile can COPY
    # packages/academie-core for Sprint 4 Phase B onwards. Frontend stays `.`.
    build:
      context: ${WEBAPP_SRC:-..}
      dockerfile: webapp/backend/Dockerfile
    container_name: academie-api
    restart: unless-stopped
    ports:
      - "127.0.0.1:8000:8000"
    networks:
      - academie-net-bridge
    env_file:
      - .env
    volumes:
      # Read-only access to host shared secrets (currently used by openai_reconcile
      # to read the OpenAI admin key without baking it into the container image).
      - /opt/academie-shared/secrets:/run/academie-secrets:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

  # ── Phase B4 — GlitchTip self-hosted observability (SSH tunnel access only) ──
  redis-glitchtip:
    image: redis:7-alpine
    container_name: redis-glitchtip
    restart: unless-stopped
    networks:
      - academie-net-bridge
    deploy:
      resources:
        limits:
          memory: 96M

  glitchtip-web:
    image: glitchtip/glitchtip:v5.0
    container_name: glitchtip-web
    restart: unless-stopped
    ports:
      - "127.0.0.1:8001:8000"   # bind localhost — SSH tunnel only
    networks:
      - academie-net-bridge
    env_file:
      - .env.glitchtip
    depends_on:
      - redis-glitchtip
    deploy:
      resources:
        limits:
          memory: 512M

  glitchtip-worker:
    image: glitchtip/glitchtip:v5.0
    container_name: glitchtip-worker
    restart: unless-stopped
    networks:
      - academie-net-bridge
    env_file:
      - .env.glitchtip
    depends_on:
      - redis-glitchtip
    command: ["./bin/run-celery-with-beat.sh"]
    deploy:
      resources:
        limits:
          memory: 384M

networks:
  academie-net-bridge:
    external: true
