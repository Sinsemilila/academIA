# ============================================================================
# === B1 (Umbral) ============================================================
# ============================================================================
B1:
  level_label: "Umbral"

  "1.Dar_y_pedir_informacion":
    "1.1.Identificar":
      - "Relativas con artículo definido + sustantivo"
      - "El + sustantivo + O. relativa"
      - "Es + un + sustantivo + O. relativa"
    "1.2.Pedir_informacion":
      - "¿Sabes si / dónde / cómo...?"
      - "Preguntas persona, cosa, lugar, tiempo, manera, evento"
    "1.3.Dar_informacion":
      - "Adverbiales lugar, tiempo, manera, cantidad"
      - "Subordinadas finalidad, razón"
    "1.4.Pedir_confirmacion":
      - "¿Puedes / Podrías decirme si...?"
      - "Quería saber si..."
    "1.5.Confirmar_informacion":
      - "Claro (que sí / no)"
      - "Por supuesto que..."

  "2.Expresar_opiniones":
    "2.1.Pedir_opinion":
      - "¿(Tú) qué piensas de + SN?"
      - "¿Te parece que...?"
      - "En tu opinión..."
    "2.2.Dar_opinion":
      - "En mi opinión..."
      - "Me parece que..."
      - "Pienso que..."
      - "No creo que + subjuntivo"
    "2.3.Pedir_valoracion":
      - "¿Qué tal?"
      - "¿Qué te parece + SN / infinitivo?"
      - "¿Te parece bien / mal...?"
    "2.4.Valorar":
      - "SN / inf. + ha sido / fue + adjetivo"
      - "Está bien / mal..."
      - "¡Qué bien / mal...!"
    "2.5.Aprobar_desaprobar":
      - "Me parece (muy) mal / bien"
      - "Está (muy) mal / bien"
      - "¡Qué mal / bien...!"
    "2.6.Posicionarse":
      - "(No) estoy a favor / en contra de..."
      - "(No) estoy de acuerdo con..."
    "2.7.Acuerdo_pregunta":
      - "¿Piensas igual / lo mismo que + SN?"
      - "¿Tú qué crees...?"
    "2.8.Invitar_acuerdo":
      - "Declaración + ¿no te parece?"
    "2.9.Expresar_acuerdo":
      - "Sí / no, claro"
      - "Tienes razón"
      - "Yo pienso lo mismo"
      - "Estoy de acuerdo"
    "2.10.Expresar_desacuerdo":
      - "Yo no pienso lo mismo"
      - "No, no es verdad que + subjuntivo"
      - "No estoy de acuerdo"
    "2.11.Mostrar_escepticismo":
      - "Bueno, depende"
      - "¿Tú crees?"
      - "(Yo) dudo que..."
    "2.12.Contraargumentar":
      - "Tienes razón, pero..."
      - "Sí, es cierto, pero..."
      - "Sí, pero también es verdad..."
    "2.13.Expresar_certeza":
      - "Estoy (totalmente) seguro de que..."
      - "Seguro que..."
      - "Está claro / Es evidente"
    "2.14.Falta_certeza":
      - "No estoy (muy) seguro de que + subjuntivo"
      - "No está claro / No es evidente"
      - "Dudo que + subjuntivo"
    "2.15.Invitar_hipotesis":
      - "¿O. interrogativa [V en futuro imperfecto]?"
    "2.16.Expresar_posibilidad":
      - "Quizá(s) / Tal vez..."
      - "Puede (ser) que..."
      - "Es posible / probable que..."
      - "A lo mejor"
    "2.17.Obligacion_necesidad":
      - "Es obligatorio / necesario..."
      - "Debes + infinitivo"
      - "No puedes + infinitivo"
    "2.18.Falta_obligacion":
      - "No es obligatorio / necesario..."
    "2.19.Pedir_conocimiento":
      - "¿Sabes / Conoces algo de + SN?"
      - "¿Sabes que / si / dónde...?"
      - "¿Has oído...?"
    "2.20.Expresar_conocimiento":
      - "(Ya) lo sé / sabía"
      - "Sé + algo de + SN"
      - "Sé perfectamente..."
      - "He oído / leído / visto que..."
    "2.21.Expresar_desconocimiento":
      - "No (lo) sé / sabía"
      - "No he oído / leído / visto"
      - "No tengo ni idea"
    "2.22.Pedir_habilidad":
      - "¿Eres bueno en / para...?"
      - "¿Eres capaz de + infinitivo?"
      - "¿Qué tal se te da...?"
    "2.23.Habilidad":
      - "Sé + algo / poco..."
      - "Soy bueno / malo en / para..."
      - "Lo hago bien / mal"
    "2.24.Pedir_recuerdo":
      - "¿Recuerdas / Te acuerdas de + SN / si...?"
      - "¿Te has olvidado de...?"
    "2.25.Expresar_recuerdo":
      - "Recuerdo / Me acuerdo de + SN / que..."
      - "No me he olvidado de..."
    "2.26.Expresar_olvido":
      - "No recuerdo / No me acuerdo de + SN"
      - "Me he olvidado de..."

  "3.Gustos_deseos_sentimientos":
    "3.1.Pedir_gustos":
      - "¿Qué te parece este / ese...?"
      - "¿Te gusta que + subjuntivo?"
      - "¿Está bueno / rico...?"
    "3.2.Expresar_gustos":
      - "Me gusta / Me encanta que + subjuntivo"
      - "Me interesa que + subjuntivo"
      - "No me importa + SN"
    "3.3.Expresar_aversion":
      - "Odio + que + subjuntivo"
      - "No soporto + SN / inf. / que + subjuntivo"
      - "Me molesta..."
      - "¡Qué horror!"
    "3.4.Pedir_preferencias":
      - "¿Qué es lo que más / menos te gusta...?"
      - "¿Prep. + qué / cuál / quién prefieres...?"
      - "¿Qué / Cuál / A quién eliges...?"
    "3.5.Expresar_preferencia":
      - "Prefiero + SN / inf. + a..."
      - "Prefiero que + subjuntivo"
      - "Me gusta / interesa más que + subjuntivo"
    "3.6.Indiferencia":
      - "No me importa + SN / inf. / que + subjuntivo"
      - "Me da igual"
    "3.7.Pedir_deseos":
      - "¿Quieres / Te apetece que + subjuntivo?"
      - "¿Tienes ganas de / Te apetece...?"
      - "¿Cuál es tu sueño?"
    "3.8.Expresar_deseos":
      - "Quiero que + subjuntivo"
      - "Tengo ganas de / Me apetece..."
      - "Espero que + subjuntivo"
      - "Sueño con..."
      - "Ojalá (que) + subjuntivo"
    "3.9.Pedir_planes":
      - "¿Piensas + infinitivo?"
      - "¿Tu intención es + infinitivo?"
      - "¿Tienes (la) intención / idea de + infinitivo?"
    "3.10.Planes_intenciones":
      - "Pienso + infinitivo"
      - "Estoy pensando en + infinitivo"
      - "Mi intención es + infinitivo"
      - "Marcadores frustración"
    "3.11.Pedir_estado_animo":
      - "¿Qué te pasa?"
      - "¿Te pasa algo?"
      - "¿Todo bien?"
      - "¿(No) estás enfadado...?"
    "3.12.Alegria_satisfaccion":
      - "¡Estupendo! / ¡Fantástico!"
      - "Estoy contento"
      - "Estoy de (muy) buen humor"
      - "Me alegro de que + subjuntivo"
      - "Es estupendo que + subjuntivo"
    "3.13.Tristeza":
      - "Estoy triste / deprimido"
      - "Siento + inf. / que + subjuntivo"
      - "Me duele..."
      - "Me da pena / lástima..."
      - "Es una pena / lástima que + subjuntivo"
    "3.14.Placer":
      - "Me río + cuantificador"
      - "Me divierto (+ cuantif.)"
      - "(Me) lo paso estupendamente / bien / fatal"
      - "Es divertido que + subjuntivo"
    "3.15.Aburrimiento":
      - "¡Qué rollo!"
      - "Me aburro"
      - "Me aburre + SN / inf. / que + subjuntivo"
      - "Estoy aburrido de..."
    "3.16.Hartazgo":
      - "Estoy harto / aburrido de + SN / inf. / de que + subjuntivo"
      - "¡No puedo más!"
      - "¡Basta ya!"
    "3.17.Enfado":
      - "Estoy (+ cuantif.) enfadado (con)..."
      - "Estoy de (muy) mal humor"
      - "Me enfado..."
      - "Me molesta / No soporto + que + subjuntivo"
    "3.18.Miedo":
      - "Estoy preocupado / asustado"
      - "Tengo (+ cuantif.) miedo a / de"
      - "Me da miedo + SN / inf. / que + subjuntivo"
      - "Me preocupa + SN / que + subjuntivo"
    "3.19.Nerviosismo":
      - "Estoy (+ cuantif.) nervioso / estresado / histérico"
      - "Me pongo nervioso / histérico"
    "3.20.Empatia":
      - "Ya, ya / Claro, claro"
      - "Lo entiendo (perfectamente)"
      - "Siento + inf. / que + subjuntivo"
      - "Entiendo que + subjuntivo"
    "3.21.Alivio":
      - "¡Ya está!"
      - "Me siento (mucho) mejor"
    "3.22.Esperanza":
      - "Espero + que sí / no / inf. / que + subjuntivo"
      - "¡Ojalá! / Ojalá que + subjuntivo"
    "3.23.Decepcion":
      - "Estoy decepcionado / desilusionado"
      - "¡Qué decepción / desilusión!"
      - "Me desilusiona / decepciona..."
    "3.24.Resignacion":
      - "¡Así es la vida!"
    "3.25.Arrepentimiento":
      - "¡Qué pena!"
    "3.26.Vergüenza":
      - "Me da vergüenza + SN / inf. / que + subjuntivo"
      - "¡Qué vergüenza!"
    "3.27.Sorpresa":
      - "Me sorprende / Me extraña + SN / inf. / que + subjuntivo"
      - "Es increíble / raro / extraño..."
      - "¡Qué sorpresa / raro / extraño!"
      - "¿De verdad? / ¿En serio?"
    "3.28.Admiracion":
      - "¡Qué guapo / grande...!"
      - "¡Qué maravilla!"
      - "¡Es increíble / impresionante...!"
      - "Estoy impresionado con..."
    "3.29.Afecto":
      - "Me caes bien / mal / fatal..."
      - "Te quiero..."
      - "Estoy enamorado (de)..."
      - "Me enamoro (de)..."
      - "Cariño"
    "3.30.Sensaciones_fisicas":
      - "Tengo + cuantif. + sed / hambre / frío / calor / sueño"
      - "Siento + sed / hambre..."
      - "¡Qué sed / hambre...!"
      - "Estoy (+ cuantif.) cansado"
      - "Me duele + cuantif. + SN"

