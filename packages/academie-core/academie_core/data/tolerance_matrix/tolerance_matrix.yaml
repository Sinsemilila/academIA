# ══════════════════════════════════════════════════════════
# TOLERANCE MATRIX — family × band → tier
# ══════════════════════════════════════════════════════════
matrix:
  verb_tense:   { beginner: ignored,  intermediate: noted,     upper: penalized, advanced: penalized }
  verb_usage:   { beginner: ignored,  intermediate: noted,     upper: noted,     advanced: penalized }
  noun_det:     { beginner: ignored,  intermediate: noted,     upper: noted,     advanced: penalized }
  pronoun:      { beginner: ignored,  intermediate: noted,     upper: noted,     advanced: penalized }
  word_order:   { beginner: ignored,  intermediate: noted,     upper: penalized, advanced: penalized }
  sentence:     { beginner: ignored,  intermediate: ignored,   upper: noted,     advanced: penalized }
  morphology:   { beginner: ignored,  intermediate: ignored,   upper: noted,     advanced: penalized }
  surface:      { beginner: ignored,  intermediate: ignored,   upper: noted,     advanced: penalized }
  # Previously full shadow — now progressively activated
  preposition:  { beginner: shadow,   intermediate: noted,     upper: penalized, advanced: penalized }
  vocabulary:   { beginner: shadow,   intermediate: noted,     upper: noted,     advanced: penalized }
  calque:       { beginner: noted,    intermediate: penalized, upper: penalized, advanced: penalized }
  discourse:    { beginner: shadow,   intermediate: shadow,    upper: noted,     advanced: penalized }

# ══════════════════════════════════════════════════════════
# TIER WEIGHTS + FEEDBACK LABELS
# ══════════════════════════════════════════════════════════
weights:
  ignored: 0.0
  noted: 0.3
  penalized: 0.8
  shadow: 0.0

feedback_labels:
  penalized:
    fr: "Priorité haute"
    en: "High priority"
    color: "red"
  noted:
    fr: "À travailler"
    en: "Work on this"
    color: "orange"
  ignored:
    fr: "Normal pour ton niveau"
    en: "Normal for your level"
    color: "gray"

# ══════════════════════════════════════════════════════════
# CEFR → BAND MAPPING
# ══════════════════════════════════════════════════════════
cefr_bands:
  A1: beginner
  A2: beginner
  B1: intermediate
  B2: upper
  C1: advanced
  C2: advanced

# ══════════════════════════════════════════════════════════
# PROGRESSION THRESHOLDS
# ══════════════════════════════════════════════════════════
progression:
  max_error_rate: 1.0        # ≤1 error/session in family to be "clean"
  min_sessions: 5            # family must appear in ≥5 sessions
  max_errors_per_turn: 3     # cap per sentence (avoid discouraging)
