# L1 transfer patterns: French → Italian.
# Prioritized by multiplier (higher = show first to LLM in L1 watch block).
# STATUS: STUB Wave 2 — expand before production activation.
# Sources placeholder: VALICO learner corpus, Bagna et al. 2017 on IT L2 acquisition,
#   Paquet 2018 for typological near-identity patterns. Wave 2 will add ~15 entries
#   with corpus-validated multipliers.
l1: fr
target: it
transfers:
  - family: aux_essere_avere
    multiplier: 1.5
    description: "Calque FR 'avoir' → auxiliaire IT : 'ho andato/ho partito' → 'sono andato/sono partito'. Verbes de mouvement + états (andare, venire, partire, restare, diventare) prennent essere, pas avere. Très fréquent A2."
  - family: ho_andato_participe
    multiplier: 1.5
    description: "Variante : accord du participe avec essere obligatoire : 'sono andato/a', 'siamo andati/e'. Avec avere, accord optionnel avec OD antéposé uniquement. A2-B1 fréquent."
  - family: art_contract
    multiplier: 1.4
    description: "Contractions préposition + article obligatoires : 'a il/di il/in il/su il/da il' → 'al/del/nel/sul/dal'. 'vado a il cinema' → 'vado al cinema'. Idem pour feminin (alla, della, nella). A1-A2 très fréquent."
  - family: false_friends
    multiplier: 1.3
    description: "libreria ≠ library (= librairie, pas bibliothèque = biblioteca) ; fattoria = ferme (pas factory = fabbrica) ; sensibile = sensé/raisonnable (pas sensible FR = sensibile émotionnel partagé mais contexte diverge) ; morbido = moelleux (pas morbide FR = morboso) ; camera = chambre (pas caméra = telecamera)."
  - family: pronoun_clitic
    multiplier: 1.2
    description: "Clitiques combinés IT : 'glielo/gliela/glieli/gliele' (lui/elle + le/la) compressés en 1 forme. Calque FR 'je le lui dis' → 'glielo dico' (pas 'lo gli dico'). Aussi 'ce l'ho' (je l'ai) — particule ci + l' obligatoire avec avere possession. B1 modéré."
