# Multi-turn example — scripted turn 2 (no learner simulator in V1).
# Turn 1 : error → bot CF. Turn 2 : learner with partial uptake.
# Oracle checks bot's turn-2 follow-up is appropriate.
id: multi_a1_verb_followup_001
source: handcrafted
scenario_key:
  agent: teacher_en
  cefr: A1
  target_tier: T2
  error_category: verb_tense
  fla: low
  style_profile: direct
multi_turn: true
turns:
  - role: learner
    text: "Yesterday I go to the park with my mum."
    turn_number: 5
    expected_errors: ["V:TENSE"]
  - role: learner
    text: "Yes I go there many time."  # partial uptake — corrected nothing
    turn_number: 7  # skip bot turn
    expected_errors: ["V:TENSE", "N:NUM"]
    uptake: "no"
expected_dimensions:
  cf_move_set_valid:
    mode: set_membership
    # Turn 2 follow-up : re-elicit or light metalinguistic if no uptake
    acceptable: [elicitation, partial_recast, clarification_request]
    forbidden: [explicit_correction]
  scaffolding_flags_honored:
    mode: all_required
    l2_ratio_band: [0.7, 0.98]
    flags_must_be_absent: []
  register_cefr_alignment:
    mode: within_sublevel
    target: A1
    tolerance: 1
  recast_saliency_and_dosage:
    mode: structural
    max_lines: 5
    max_questions: 2
    error_form_isolated: true
    mini_lesson_allowed: false
  semantic_fidelity_pairwise:
    mode: llm_pairwise
    vs_golden: true
