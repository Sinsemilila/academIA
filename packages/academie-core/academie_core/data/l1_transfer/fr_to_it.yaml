# L1 transfer patterns: French → Italian.
# Prioritized by multiplier (higher = show first to LLM in L1 watch block).
# STATUS: Session 51 expansion (12 entries) — validation Pipeline 4-layer
#   (cf vault/knowledge/multilang-validation-without-natives.md) :
#   - Layer 1 authoritative : CILS Sillabo + Profilo della Lingua Italiana 2010
#   - Layer 2 corpus : MERLIN-IT 813 textes (FR-L1 ~50-80) + VALICO Torino (FR-L1 explicit)
#   - Layer 3 academic : Bagna 2017, Pienemann/Di Biase/Bettoni PT, Paquet 2018, Cinque,
#     Sorace 2011, Karagjosova IJLCR 2020
#   - Layer 4 LLM cross-validation pre-prod : GPT-4o + Claude IT-quality spot-check (TODO)
#   - Layer 5 oracle harness behavioral validation (TODO post-implementation)
# Cf. vault/knowledge/multilang-italian-research.md pour bibliographie complète.
l1: fr
target: it
transfers:
- family: aux_essere_avere
  multiplier: 1.5
  description: 'Calque FR ''avoir'' → auxiliaire IT : ''ho andato/ho partito'' → ''sono andato/sono partito''. Verbes de mouvement + états (andare, venire, partire, restare, diventare) prennent essere,
    pas avere. Très fréquent A2.'
- family: ho_andato_participe
  multiplier: 1.5
  description: 'Variante : accord du participe avec essere obligatoire : ''sono andato/a'', ''siamo andati/e''. Avec avere, accord optionnel avec OD antéposé uniquement. A2-B1 fréquent.'
- family: art_contract
  multiplier: 1.4
  description: 'Contractions préposition + article obligatoires : ''a il/di il/in il/su il/da il'' → ''al/del/nel/sul/dal''. ''vado a il cinema'' → ''vado al cinema''. Idem pour feminin (alla, della, nella).
    A1-A2 très fréquent.'
- family: congiuntivo_trigger
  multiplier: 1.4
  description: 'Subjonctif IT obligatoire après volonté/doute/émotion + ''che'' : voglio che, spero che, penso che (forme négative), benché, sebbene, prima che. Calque FR indicatif : ''voglio che tu vieni''
    → ''voglio che tu venga''. Pas 1:1 avec FR (fr accepte indicatif après ''penser que'' positif). B1-B2 fréquent.'
- family: false_friends
  multiplier: 1.3
  description: 'Top faux amis FR→IT (50+ catalog research file §3) : libreria = librairie (pas bibliothèque = biblioteca) ; fattoria = ferme (pas factory = fabbrica) ; sensibile = émotionnel-partagé contexte
    diverge ; morbido = moelleux (pas morbide = morboso) ; camera = chambre (pas caméra = telecamera) ; carta = papier (pas carte = mappa/tessera) ; conferenza = conférence (mais aussi cours universitaire).
    Note anti-pattern : ''burro'' = beurre IT (vrai cognate FR), faux ami uniquement en ES. A1-B2 fréquent.'
- family: gender_e_noun
  multiplier: 1.3
  description: 'Noms IT en -e ambigus M/F (vs FR -e majoritairement F). Masculins : il fiore, il pane, il sole, il latte, il cane, il dente. Féminins : la chiave, la classe, la notte, la madre. Apprenant·e
    transfère le genre FR systématiquement. A1-A2 très fréquent.'
- family: pronoun_clitic
  multiplier: 1.2
  description: 'Clitiques combinés IT : ''glielo/gliela/glieli/gliele'' (lui/elle + le/la) compressés en 1 forme. Calque FR ''je le lui dis'' → ''glielo dico'' (pas ''lo gli dico''). Aussi ''ce l''ho''
    (je l''ai) — particule ci + l'' obligatoire avec avere possession. B1 modéré.'
- family: tu_lei_register
  multiplier: 1.2
  description: Tu (informel) vs Lei (formel, 3e pers sing, capital L) — Lei conjugation = elle. FR vous (2e pers plur) ne mappe pas directement à Lei. Apprenant·e dit 'voi' (= vous pluriel collectif) en
    contexte formel sing → 'Lei'. A2-B1 fréquent professionnel/commercial.
- family: cognate_pronunciation_orthography
  multiplier: 1.1
  description: 'Cognates FR-IT 85% mais orthographe diverge : double consonants IT (mamma, latte, anno, verrà — vs FR maman, lait, an, viendra). Apprenant·e omet : ''ano'' au lieu de ''anno''. Aussi accents
    : caffè, perché, città, virtù — finals stressed. A1-A2 fréquent.'
- family: passato_prossimo_remoto_register
  multiplier: 1.0
  description: 'Italien standard a passato prossimo (oral, nord-IT, default learner) + passato remoto (sud, littéraire, formel). FR passé composé seul → apprenant·e n''utilise jamais remoto. À B2+ : exposition
    à littérature/registre formel. Pas une erreur A1-B2, juste sub-utilisation.'
- family: si_passivante_impersonale
  multiplier: 1.0
  description: 'Italien si passivante (si + verbe 3e pers + sujet pluriel = se + infinitif FR : ''si vendono case'' = ''on vend des maisons''). Calque FR ''on'' → uno + verbe 3e sing en IT (forme moins
    idiomatique). B1 modéré.'
- family: ne_partitive_quantitative
  multiplier: 1.0
  description: 'Particule ''ne'' IT pour quantitatif/partitif obligatoire : ''quanti libri hai?'' → ''ne ho tre'' (j''en ai trois) ; ''parli di Marco?'' → ''ne parlo'' (j''en parle). FR ''en'' similaire
    mais distribution diverge. B1 fréquent.'
