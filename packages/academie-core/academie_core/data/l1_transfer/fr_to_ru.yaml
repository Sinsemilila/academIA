# L1 transfer patterns: French → Russian.
# Prioritized by multiplier (higher = show first to LLM in L1 watch block).
# STATUS: Session 51 expansion (12 entries) — validation Pipeline 4-layer
#   (cf vault/knowledge/multilang-validation-without-natives.md) :
#   - Layer 1 authoritative : Pushkin Institute TORFL specs TEU-TRKI-2 (ADR-013 essential tier)
#     + Gosstandart official Russian Federation standard
#   - Layer 2 corpus : RLC HSE 4M tokens error-tagged (FR-L1 filterable, **best mature**
#     situation parmi les 4 langues), "Дорога в Россию" textbook
#   - Layer 3 academic : Krapivkina aspect studies, Frontiers 2023 cross-L1 aspect bottleneck
#     confirmation, RuLEC + RLC published findings
#   - Layer 4 LLM cross-validation : GPT-4o + Claude native-quality RU (TODO pre-prod).
#     Geopolitical : éviter YandexGPT/GigaChat Russia-hosted, utiliser Whisper/Claude/GPT-4o
#   - Layer 5 oracle harness behavioral (TODO post-implementation)
# Cf. vault/knowledge/multilang-russian-research.md pour bibliographie complète.
# Note: typological distance FR-RU = distant Slavic vs Romance, mais Indo-European same family
#   → ~50% L2 A1 / 50% L1 scaffolding (mid-distance, easier than JP 30/70).
l1: fr
target: ru
transfers:
- family: cases_6
  multiplier: 1.6
  description: Russe a 6 cas (именительный/nom, родительный/gen, дательный/dat, винительный/acc, творительный/inst, предложный/prep) vs FR 0 cas. Transfer systémique à chaque déclinaison de nom, adjectif,
    pronom. Apprenant·e FR utilise par défaut la forme de dictionnaire (nom) partout → phrase agrammaticale. A1-B2 persistant.
- family: aspect_perfective_imperfective
  multiplier: 1.6
  description: 'Chaque verbe russe a 2 aspects (perfectif писать/написать, imperfectif говорить/сказать). Choix aspectuel gouverne le sens (action complétée vs en cours). FR n''a pas cette distinction systémique
    — calque imperfectif → erreurs graves de narration. ''Вчера я писал письмо'' (j''écrivais, activité) vs ''Вчера я написал письмо'' (j''ai écrit, achevé). Frontiers 2023 confirms #1 bottleneck cross-L1.'
- family: motion_verbs_directional
  multiplier: 1.4
  description: 'Paires de verbes de mouvement RU : multidirectionnel (ходить/ездить/бегать = aller-venir habituellement) vs unidirectionnel (идти/ехать/бежать = aller en cours). FR ''aller'' couvre les
    2. ''Я хожу в школу каждый день'' (multid, habitude) vs ''Я иду в школу сейчас'' (unid, en route maintenant). Apprenant·e FR confond. A2-B1 fréquent. Aussi formes préfixées (приходить/уходить/выходить)
    pour aspects directionnels.'
- family: no_articles
  multiplier: 1.3
  description: 'Russe n''a pas d''articles (le/la/un/une). ''Я купил книгу'' (j''ai acheté livre) sans aucun article. Apprenant·e FR peut tenter d''insérer ''один/одна'' (un/une) systématiquement ou de
    marquer la définitude par l''ordre des mots — inapproprié hors insistance. Aussi : pas d''article partitif (de la/du).'
- family: numeral_noun_agreement
  multiplier: 1.3
  description: 'Numéraux RU déclenchent cas différents sur le nom : 1 = nominatif (один стол), 2-4 = génitif singulier (два стола), 5+ = génitif pluriel (пять столов). Aussi один/одна/одно accord en genre.
    FR système numérique invariant. Apprenant·e FR utilise nom-nominatif après tous les nombres. A2-B1 fréquent.'
- family: word_order_free_but_marked
  multiplier: 1.2
  description: Ordre des mots libre grammaticalement mais pragmatiquement marqué (thème-rhème). 'Я читаю книгу' (neutre) / 'Книгу я читаю' (emphase sur livre) / 'Читаю я книгу' (registre oral/insistance).
    Apprenant·e FR impose SVO rigide → phrases monotones mais grammaticalement OK. Erreur subtile B1+.
- family: reflexive_sya
  multiplier: 1.2
  description: 'Suffixe verbal -ся/-сь = voix moyenne réflexive RU : умываться (se laver), смеяться (rire), казаться (sembler), нравиться (plaire), бояться (avoir peur). FR distingue verbes pronominaux
    + non-pronominaux différemment. Apprenant·e FR sur-ajoute ou omet -ся (calque ''se laver'' → ajoute -ся à умывать sans réflexion ou inverse). A1-B1 fréquent.'
- family: gender_soft_ending
  multiplier: 1.2
  description: 'Noms RU en -ь (soft sign) sont parfois M, parfois F sans règle morphologique évidente : мать (mère, F), путь (chemin, M), дочь (fille, F), огонь (feu, M), любовь (amour, F), словарь (dictionnaire,
    M). Apprenant·e FR doit mémoriser. A1-A2 fréquent.'
- family: ty_vy_register
  multiplier: 1.1
  description: 'Ты (informel sing) vs Вы (formel sing OU pluriel). Mapping FR tu/vous quasi 1:1 mais : (1) Вы avec verbe pluriel même si singulier formel. (2) Patronymique (отчество) avec Вы en formel :
    ''Иван Иванович, как вы поживаете?'' — pas de FR équivalent direct. A2-B1 fréquent context professionnel.'
- family: false_friends_cognates_diverging
  multiplier: 1.1
  description: 'Cognates FR-RU divergents (international vocabulary partagée mais sens shift) : магазин (magazin) = magasin/boutique (pas magazine = журнал) ; кабинет (kabinet) = bureau personnel (pas WC
    = туалет) ; диван (divan) = canapé/sofa (vs divan FR sofa-couchette) ; фамилия (familiya) = nom de famille (pas famille = семья) ; интеллигентный = cultivé (pas intelligent = умный). B1-B2 fréquent.'
- family: soft_sign_omission
  multiplier: 1.0
  description: 'Soft sign (ь) marque palatalization de la consonne précédente : брат (frère) vs брать (prendre — infinitif). Sans ь, sens change. FR n''a pas cette distinction phonémique. Apprenant·e FR
    omet souvent → erreur orthographique surface. A1-B1 fréquent.'
- family: aspect_prefix_overgen
  multiplier: 1.0
  description: 'Préfixes verbaux RU créent forme perfective + nuancent : по- (commencer/un peu), на- (sur, accumulation), вы- (sortir), за- (commencer/derrière), при- (arrivée), у- (départ). Apprenant·e
    FR sur-utilise по- comme perfective générique → erreur perfective sans nuance directionnelle. B1+ fréquent.'
