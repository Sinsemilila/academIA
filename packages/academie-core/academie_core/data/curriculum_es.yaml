# Spanish curriculum — CEFR concepts + weights + groups per level.
#
# Status : DRAFT (Session 53 honest annotation 2026-04-30) — original DRAFT
# header pre-S52 claimed "sourced from PCIC" but PCIC was NOT acquired before
# Session 52. Session 53 acquired PCIC Vol A (A1+A2) + Vol B (B1+B2) skimmed.
# Vol C (C1+C2) acquisition pending (free `cvc.cervantes.es/ensenanza/biblioteca_ele/plan_curricular/`).
#
# Format mirrors curriculum_en.yaml structure (used by Dify chatflow Teacher).
# Keys MUST match concept_hints/es.yaml and rules_es.py where applicable.
#
# weight = minutes estimées par concept (3 = léger, 5 = moyen, 8 = lourd)
# group = thème fonctionnel pour les examens (regroupe concepts reliés)
#
# === GAPS IDENTIFIED Session 53 (vs PCIC + CEFR Companion 2020) ===
# Action plan : see TODO.md "Phase C — P0 ES flagship audit" + see
# `/root/sinse-vault/knowledge/books/cervantes-2006-plan-curricular-{a1-a2,b1-b2}.md`
# for skim decisions + extraction plan.
#
# 1. Single dimension (grammar only) vs PCIC 13 inventarios per level
#    (Gramática, Funciones, Pronunciación, Ortografía, Tácticas pragmáticas,
#    Géneros discursivos, Nociones generales, Nociones específicas, Referentes
#    culturales, Saberes y comportamientos socioculturales, Habilidades
#    interculturales, Procedimientos de aprendizaje, Objetivos generales)
# 2. ser/estar A1 generic (1 entry) — PCIC A1 stratifies into 7 subcategories
#    (identidad / nacionalidad / origen / hora / fecha / posesión / cantidad)
# 3. subjuntivo B1 = 2 entries (presente + temporal) — PCIC B1 has 12-15
#    triggers stratified (volonté / émotion / duda / temporal / finalidad /
#    condicional / concesivo / influencia). Judge cannot diagnose subjuntivo
#    errors with 2 buckets.
# 4. connectores_argumentativos B2 = 1 entry — PCIC B2 splits into 6 classes
#    (causal / consecutivo / concesivo / final / temporal / contraargumentativo).
#    Stratification critical for discourse-level scoring.
# 5. verbos de cambio (ponerse / volverse / quedarse / hacerse / convertirse en)
#    absent B1-B2 — PCIC B1-B2 dedicate dedicated subsection.
# 6. Regional variation (voseo Río de la Plata / tuteo / vosotros peninsular)
#    absent — PCIC default = panhispánico mais explicite. Decide flagship ES
#    audience target before extraction.
# 7. No FUNCTIONS dimension (PCIC Funciones inventario = pragmatic communicative
#    goals — saludar, presentarse, expresar opinión, etc.) → Phase D.
# 8. No PRAGMATIC STRATEGIES dimension (PCIC Tácticas = politeness, register,
#    repair) → cross-ref Lyster cf-taxonomy.
# 9. No CULTURAL inventario (PCIC Referentes culturales + Saberes
#    socioculturales = 3 inventarios). Defer Phase D Phase 2.
# 10. C1-C2 underspecified (8+5 concepts) — PCIC Vol C C1-C2 acquisition
#     pending Sinse manual (free cvc.cervantes.es).
#
# Estimated post-Phase-C expansion : 52 concepts → ~120-150 concepts (still
# Gramática-only ; +20-30 with Funciones, +30-50 with Nociones específicas).
#
# === L1 transfer integration (FR L1 baseline) ===
# Cross-reference : `data/l1_transfer/fr_to_es.yaml` (12 entries, S51 expansion).
# Already consumed by `pedagogy/teacher_prompt.py:488` (per-session
# load_l1_transfers(l1_code, target_code)). Family mapping :
# `taxonomy/categories.py:50` ("l1_transfer": [PREP:CALQUE, SPELL:COGNATE]).
# FR-ES proximity exploit : leverage cognates massively (educación, posibilidad,
# información, situación) ; flag faux amis (largo ≠ large = long ; embarazada
# ≠ embarrassed = pregnant ; sensible ≠ sensible = sensitive ; éxito ≠ exit =
# success). Phase C will refine via PCIC contrastive notes if available.
# Phase D extension : add en_to_es, etc. when user base diversifies.
#
# === Phase C4 audit patch (Session 53 — 2026-04-30) ===
# 50+ concept_keys added/split per `webapp/backend/docs/audit/2026-04-30-curriculum-es-vs-pcic.md`.
# Sources : PCIC Vol A+B Gramática inventario (extracted YAMLs in extracted/cervantes-2006-*).
# - Split ser_estar_basico A1 → 6 keys (4 SER + 2 ESTAR senses + meta contrast)
# - Relabel pretérito_indefinido + pretérito_perfecto + imperativo_afirmativo_tu A2 → A1 per PCIC ordering
# - Split subjuntivo_presente + subjuntivo_temporal B1 → 6 keys per trigger taxonomy
# - Split por_para B1 → 2 keys (por causal/medio/durée vs para finalidad/destino/plazo)
# - Split conectores_argumentativos B2 → 6 keys per discourse function
# - Add verbos_cambio_b2 ⭐ critical gap
# - Add pasiva_perifrástica_b2 vs pasiva_refleja_b1 distinction
# - C1+C2 deferred (PCIC Vol C acquisition pending)
# Concept count : 51 → ~95 (+86%).

