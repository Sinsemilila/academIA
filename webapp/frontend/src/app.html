<!doctype html>
<html lang="fr" data-theme="dark">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
		<meta name="theme-color" content="#0a0a0a" />
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
		<meta name="description" content="Academie-IA — Plateforme d'apprentissage augmentee par IA" />
		<link rel="icon" href="/icons/icon-192.png" type="image/png" />
		<link rel="apple-touch-icon" href="/icons/icon-192.png" />
		<link rel="manifest" href="/manifest.json" />
		<link rel="preload" href="/fonts/Geist-Variable.woff2" as="font" type="font/woff2" crossorigin />
		<link rel="preload" href="/fonts/SourceSerif4-Variable.woff2" as="font" type="font/woff2" crossorigin />
		%sveltekit.head%
		<script>
			// Apply theme before first paint to prevent flash
			(function() {
				var theme = localStorage.getItem('theme') || 'dark';
				document.documentElement.setAttribute('data-theme', theme);
				var mc = document.querySelector('meta[name="theme-color"]');
				if (mc) mc.content = theme === 'light' ? '#fafafa' : '#0a0a0a';
			})();
		</script>
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
		<script>
			if ('serviceWorker' in navigator) {
				window.addEventListener('load', () => {
					navigator.serviceWorker.register('/sw.js').catch(() => {});
				});
			}
		</script>
	</body>
</html>
