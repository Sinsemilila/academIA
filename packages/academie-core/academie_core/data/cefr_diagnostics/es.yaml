# CEFR diagnostic question examples — Spanish (ES).
# DRAFT — requires native speaker review. Sourced from PCIC diagnostic
# materials + DELE exam samples (Instituto Cervantes). Used by Maestro Dify
# chatflow during onboarding Phase 2 (diagnostic) to set palier-appropriate
# first question + provide palier reference.

paliers_first_question:
  cero_o_casi: "A1-A2 : 'Háblame de ti'"
  frases_simples: "A2-B1 : '¿Qué hiciste el fin de semana pasado?'"
  conversacion_basica: "B1 : '¿Qué harías si ganaras la lotería?'"
  comodo: "B2 : '¿Cuáles son los pros y los contras del teletrabajo?'"
  avanzado: "C1 : 'Hay quien dice que la IA reemplazará a los profesores. ¿Estás de acuerdo?'"

paliers_reference:
  A1-A2: '"Háblame de ti" / "¿Qué te gusta hacer?"'
  A2-B1: '"¿Qué hiciste el fin de semana pasado?" / "Describe a tu mejor amigo"'
  B1: '"¿Qué harías si ganaras la lotería?"'
  B1-B2: '"Cuéntame sobre una decisión difícil que tuviste que tomar"'
  B2: '"¿Cuáles son los pros y los contras del teletrabajo?"'
  B2-C1: '"¿Cómo sería el mundo si no se hubiera inventado internet?"'
  C1: '"Hay quien dice que la IA reemplazará a los profesores. ¿Estás de acuerdo?"'
  C1-C2: '"¿Hasta qué punto el lenguaje moldea el pensamiento?"'

microtasks:
  - "Escribe una frase para rechazar una invitación"
  - "Describe esta situación: llegas a un restaurante y tu mesa reservada está ocupada"
  - "Completa esta frase con tus propias palabras: Si hubiera sabido..."
  - "Escribe un correo breve para reprogramar una reunión"

# Language labels for persona building (used by Maestro prompts)
persona:
  target_name: "Español"         # "profesor de Español"
  target_prof: "de español"      # "profesor de español"
