# English curriculum — CEFR concepts + weights + groups per level.
# Sourced from : CEFR 2020 Companion Volume, Cambridge English Profile (EVP),
#   Hughes & Reed B2-C2 grammars, concept_hints/en.yaml (20 concepts) +
#   rubrics/en.yaml "Target structures" sections per level.
# Format mirrors curriculum_es.yaml (used by Dify chatflow Teacher +
# error_analysis_router).
# Keys MUST match concept_hints/en.yaml where present (additional structural keys
# introduced here are documented in comments).
#
# Updated : Session 41 (2026-04-23) — merge from DB taxonomy (53 → 94 concepts).
# See `scripts/sprint6/19_curriculum_en_apply_merge.py` for canonical source of truth.
#
# weight = minutes estimées par concept (3 = léger, 5 = moyen, 8 = lourd)
# group = thème fonctionnel pour les examens (regroupe concepts reliés)

domain: en
A1:
  description: Survival — greet, introduce, request basic info (time, price, name, place). Present simple + can/want. Concrete
    vocab (~500 words BNC).
  concept_keys:
  - present_simple_basic
  - articles_a_an_the
  - prepositions_place
  - possessive_s
  - can_could_basic
  - there_is_there_are
  - numbers_dates_times
  - plural_nouns
  - greetings_introductions
  - subject_pronouns
  - object_pronouns
  - to_be_forms
  - to_have_got
  - demonstratives
  - possessive_adjectives
  - wh_questions
  - short_answers
  - prepositions_time
  concept_weights:
    present_simple_basic: 5
    articles_a_an_the: 5
    prepositions_place: 3
    possessive_s: 3
    can_could_basic: 3
    there_is_there_are: 3
    numbers_dates_times: 3
    plural_nouns: 3
    greetings_introductions: 3
    subject_pronouns: 3
    object_pronouns: 3
    to_be_forms: 5
    to_have_got: 5
    demonstratives: 3
    possessive_adjectives: 5
    wh_questions: 5
    short_answers: 3
    prepositions_time: 5
  concept_groups:
    grammar:
    - present_simple_basic
    nouns_articles:
    - articles_a_an_the
    - possessive_s
    - plural_nouns
    - demonstratives
    - possessive_adjectives
    connectors:
    - prepositions_place
    - prepositions_time
    verb_tenses:
    - can_could_basic
    - to_be_forms
    - to_have_got
    structures:
    - there_is_there_are
    misc:
    - numbers_dates_times
    - greetings_introductions
    pronouns:
    - subject_pronouns
    - object_pronouns
    questions:
    - wh_questions
    - short_answers
