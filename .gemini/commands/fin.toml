description = "Protocole de fermeture de session — met à jour la doc et commit/push"

prompt = """
Exécute le protocole de fermeture obligatoire dans cet ordre exact, sans sauter d'étape :

1. Mettre à jour `/root/sinse-workspace/context/STATE.md` — refléter l'état exact du projet après cette session
2. Mettre à jour `/root/sinse-workspace/context/TODO.md` — retirer les tâches complétées, ajouter les nouvelles découvertes
3. Ajouter une ligne dans `/root/sinse-workspace/context/CHANGELOG.md` si une feature ou tâche a été complétée (format : [DATE] Gemini — [ce qui a été fait])
4. Ajouter dans `/root/sinse-workspace/context/DECISIONS.md` si une décision importante a été prise (format : [DATE] Gemini — [décision] — [raison])
5. Écrire `/root/sinse-workspace/context/HANDOFF.md` — message complet pour la prochaine session IA (où on en est, ce qui a été fait, par où commencer, commandes utiles, rappels)
6. Commit et push : cd /root/sinse-workspace && git add -A && git commit -m "[Gemini] $(date +%Y-%m-%d) — résumé en une ligne" && git push origin gemini
7. Confirmer que tout est pushé, puis faire /quit

Ne pas faire /quit avant que le commit et le push soient confirmés.
"""
