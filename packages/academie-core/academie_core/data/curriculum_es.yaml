# Spanish curriculum — CEFR concepts + weights + groups per level.
#
# Status : DRAFT (Session 53 honest annotation 2026-04-30) — original DRAFT
# header pre-S52 claimed "sourced from PCIC" but PCIC was NOT acquired before
# Session 52. Session 53 acquired PCIC Vol A (A1+A2) + Vol B (B1+B2) skimmed.
# Vol C (C1+C2) acquisition pending (free `cvc.cervantes.es/ensenanza/biblioteca_ele/plan_curricular/`).
#
# Format mirrors curriculum_en.yaml structure (used by Dify chatflow Teacher).
# Keys MUST match concept_hints/es.yaml and rules_es.py where applicable.
#
# weight = minutes estimées par concept (3 = léger, 5 = moyen, 8 = lourd)
# group = thème fonctionnel pour les examens (regroupe concepts reliés)
#
# === GAPS IDENTIFIED Session 53 (vs PCIC + CEFR Companion 2020) ===
# Action plan : see TODO.md "Phase C — P0 ES flagship audit" + see
# `/root/sinse-vault/knowledge/books/cervantes-2006-plan-curricular-{a1-a2,b1-b2}.md`
# for skim decisions + extraction plan.
#
# 1. Single dimension (grammar only) vs PCIC 13 inventarios per level
#    (Gramática, Funciones, Pronunciación, Ortografía, Tácticas pragmáticas,
#    Géneros discursivos, Nociones generales, Nociones específicas, Referentes
#    culturales, Saberes y comportamientos socioculturales, Habilidades
#    interculturales, Procedimientos de aprendizaje, Objetivos generales)
# 2. ser/estar A1 generic (1 entry) — PCIC A1 stratifies into 7 subcategories
#    (identidad / nacionalidad / origen / hora / fecha / posesión / cantidad)
# 3. subjuntivo B1 = 2 entries (presente + temporal) — PCIC B1 has 12-15
#    triggers stratified (volonté / émotion / duda / temporal / finalidad /
#    condicional / concesivo / influencia). Judge cannot diagnose subjuntivo
#    errors with 2 buckets.
# 4. connectores_argumentativos B2 = 1 entry — PCIC B2 splits into 6 classes
#    (causal / consecutivo / concesivo / final / temporal / contraargumentativo).
#    Stratification critical for discourse-level scoring.
# 5. verbos de cambio (ponerse / volverse / quedarse / hacerse / convertirse en)
#    absent B1-B2 — PCIC B1-B2 dedicate dedicated subsection.
# 6. Regional variation (voseo Río de la Plata / tuteo / vosotros peninsular)
#    absent — PCIC default = panhispánico mais explicite. Decide flagship ES
#    audience target before extraction.
# 7. No FUNCTIONS dimension (PCIC Funciones inventario = pragmatic communicative
#    goals — saludar, presentarse, expresar opinión, etc.) → Phase D.
# 8. No PRAGMATIC STRATEGIES dimension (PCIC Tácticas = politeness, register,
#    repair) → cross-ref Lyster cf-taxonomy.
# 9. No CULTURAL inventario (PCIC Referentes culturales + Saberes
#    socioculturales = 3 inventarios). Defer Phase D Phase 2.
# 10. C1-C2 underspecified (8+5 concepts) — PCIC Vol C C1-C2 acquisition
#     pending Sinse manual (free cvc.cervantes.es).
#
# Estimated post-Phase-C expansion : 52 concepts → ~120-150 concepts (still
# Gramática-only ; +20-30 with Funciones, +30-50 with Nociones específicas).

domain: es

A1:
  description: "Acceso — survie communicative, présent indicatif, ser/estar basique, genre."
  # TODO[S53-PCIC-audit Phase C]: ser_estar_basico generic — split into 7 PCIC A1
  # subcategories (identidad / nacionalidad / origen / hora / fecha / posesión /
  # cantidad). Action : during Phase C extract PCIC Vol A Gramática inventario A1
  # ser/estar subsection → expand 1 key → 7 keys. Update concept_hints/es.yaml.
  concept_keys:
    - genero_masculino_femenino
    # TODO[S53-PCIC-audit Phase C]: PCIC A1 gender includes irregularities
    # (problema = m, mano = f, día = m, agua = f singular but el agua art).
    # Hint should mention these. Add to concept_hints/es.yaml during expansion.
    - ser_estar_basico
    - presente_indicativo_regular
    - articulos_definidos
    - articulos_indefinidos
    - hay_vs_esta
    - tener_que
    - numeros_fechas
    - pronombres_sujeto
    - saludos_presentaciones
  concept_weights:
    genero_masculino_femenino: 5
    ser_estar_basico: 8
    presente_indicativo_regular: 5
    articulos_definidos: 3
    articulos_indefinidos: 3
    hay_vs_esta: 5
    tener_que: 3
    numeros_fechas: 3
    pronombres_sujeto: 3
    saludos_presentaciones: 3
  concept_groups:
    grammar: [genero_masculino_femenino, presente_indicativo_regular, articulos_definidos, articulos_indefinidos, pronombres_sujeto]
    verbs_basic: [ser_estar_basico, hay_vs_esta, tener_que]
    vocab: [numeros_fechas, saludos_presentaciones]

A2:
  description: "Plataforma — passé simple et composé, comparaisons, gustar-type, impératif."
  concept_keys:
    - preterito_indefinido
    - preterito_perfecto
    - gustar_type
    - imperativo_afirmativo_tu
    - comparativos
    - futuro_ir_a
    - pronombres_objeto_directo
    - adverbios_frecuencia
    - conectores_temporales_basicos
  concept_weights:
    preterito_indefinido: 8
    preterito_perfecto: 5
    gustar_type: 8
    imperativo_afirmativo_tu: 5
    comparativos: 5
    futuro_ir_a: 3
    pronombres_objeto_directo: 5
    adverbios_frecuencia: 3
    conectores_temporales_basicos: 3
  concept_groups:
    past_tenses: [preterito_indefinido, preterito_perfecto]
    structures: [gustar_type, imperativo_afirmativo_tu, futuro_ir_a]
    pronouns: [pronombres_objeto_directo]
    comparison: [comparativos]
    discourse: [adverbios_frecuencia, conectores_temporales_basicos]

B1:
  description: "Umbral — subjonctif triggers, imperfecto/indefinido, condicional, estilo indirecto."
  # TODO[S53-PCIC-audit Phase C]: subjuntivo = 2 entries (presente + temporal).
  # PCIC B1 has 12-15 triggers stratified (volonté / émotion / duda / temporal /
  # finalidad / condicional / concesivo / influencia). Judge cannot diagnose
  # subjuntivo errors with 2 buckets. Action : during Phase C extract PCIC Vol B
  # Gramática inventario B1 subjuntivo subsection → split current 2 keys into 12-15.
  # TODO[S53-PCIC-audit Phase C]: verbos de cambio (ponerse / volverse / quedarse /
  # hacerse / convertirse en) absent — PCIC B1 dedicates a subsection. Add 5+
  # concept_keys under new "verbos_cambio" subsection.
  concept_keys:
    - imperfecto_vs_indefinido
    - subjuntivo_presente
    - subjuntivo_temporal
    - condicional_simple
    - por_para
    - estilo_indirecto_basico
    - verbos_preposicion
    - pronombres_indirectos
    - pronombres_reflexivos
    - marcadores_discursivos_b1
  concept_weights:
    imperfecto_vs_indefinido: 8
    subjuntivo_presente: 8
    subjuntivo_temporal: 5
    condicional_simple: 5
    por_para: 8
    estilo_indirecto_basico: 5
    verbos_preposicion: 5
    pronombres_indirectos: 5
    pronombres_reflexivos: 3
    marcadores_discursivos_b1: 3
  concept_groups:
    aspect: [imperfecto_vs_indefinido]
    subjunctive_core: [subjuntivo_presente, subjuntivo_temporal]
    conditional: [condicional_simple]
    prepositions: [por_para, verbos_preposicion]
    reported_speech: [estilo_indirecto_basico]
    pronouns: [pronombres_indirectos, pronombres_reflexivos]
    discourse: [marcadores_discursivos_b1]

B2:
  description: "Avanzado — subjonctif complexe, condicional compuesto, pasiva refleja, argumentation."
  # TODO[S53-PCIC-audit Phase C]: conectores_argumentativos = 1 entry. PCIC B2
  # splits into 6 classes (causal / consecutivo / concesivo / final / temporal /
  # contraargumentativo). Stratification critical for discourse-level scoring.
  # Action Phase C : split 1 → 6 keys + adjust weights + groups.
  # TODO[S53-PCIC-audit Phase C]: voseo / tuteo / vosotros regional markers absent.
  # Decision needed : flagship ES = panhispánico (PCIC default explicit) OR
  # peninsular tuteo only ? Sinse review pre-Phase C.
  concept_keys:
    - condicional_compuesto
    - subjuntivo_imperfecto
    - subjuntivo_pluscuamperfecto
    - pasiva_refleja
    - aunque_modo
    - conectores_argumentativos
    - colocaciones_b2
    - verbos_pronominales
    - estilo_indirecto_avanzado
  concept_weights:
    condicional_compuesto: 5
    subjuntivo_imperfecto: 8
    subjuntivo_pluscuamperfecto: 8
    pasiva_refleja: 5
    aunque_modo: 5
    conectores_argumentativos: 5
    colocaciones_b2: 5
    verbos_pronominales: 3
    estilo_indirecto_avanzado: 5
  concept_groups:
    subjunctive_advanced: [subjuntivo_imperfecto, subjuntivo_pluscuamperfecto, aunque_modo]
    conditional: [condicional_compuesto]
    voice: [pasiva_refleja]
    argumentation: [conectores_argumentativos]
    lexicon: [colocaciones_b2, verbos_pronominales]
    reported_speech: [estilo_indirecto_avanzado]

C1:
  description: "Dominio operativo eficaz — registre, modismos, inversion, précision stylistique."
  concept_keys:
