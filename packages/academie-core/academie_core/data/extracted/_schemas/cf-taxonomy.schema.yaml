# JSON Schema (YAML form) — Corrective feedback taxonomy extraction
# Used for : Lyster 2007, Lyster & Saito 2010, Lightbown/Spada Ch 5, Ellis CF papers
# Consumer : oracle/judges/llm_pairwise.py rubric, tolerance_matrix builder, fewshot generator

$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "academia/extracted/_schemas/cf-taxonomy.schema.yaml"
title: "CF Taxonomy Extraction"
type: object
required: [source_book, extracted_by, extracted_date, schema_version, cf_moves]
additionalProperties: false

properties:
  source_book:
    type: string
    description: "Slug matching vault/knowledge/books/<slug>.md and extracted/<slug>/"
    pattern: "^[a-z0-9-]+$"

  extracted_by:
    enum: [claude, sinse_manual, hybrid]

  extracted_date:
    type: string
    format: date

  schema_version:
    type: integer
    minimum: 1

  schema_ref:
    type: string
    const: "_schemas/cf-taxonomy.schema.yaml"

  cf_moves:
    type: array
    minItems: 1
    items:
      type: object
      required: [id, definition, cefr_appropriateness, source, confidence]
      additionalProperties: false
      properties:
        id:
          enum:
            - explicit_correction
            - metalinguistic_feedback
            - elicitation
            - clarification_request
            - repetition
            - implicit_recast
            - explicit_recast
            - prompt_plus_remediation
            - full_recast
            - partial_recast

        definition:
          type: string
          description: "Direct or paraphrased definition. If paraphrased, mark confidence: medium."

        cefr_appropriateness:
          type: object
          required: [a1, a2, b1, b2, c1, c2]
          properties:
            a1: { enum: [high, medium, low, contraindicated] }
            a2: { enum: [high, medium, low, contraindicated] }
            b1: { enum: [high, medium, low, contraindicated] }
            b2: { enum: [high, medium, low, contraindicated] }
            c1: { enum: [high, medium, low, contraindicated] }
            c2: { enum: [high, medium, low, contraindicated] }

        counter_indications:
          type: array
          items: { type: string }
          description: "Conditions when this move should NOT be used"

        co_occurrence_warning:
          type: array
          items: { type: string }
          description: "Common pairing patterns to be aware of"

        empirical_effect_size:
          type: object
          properties:
            study: { type: string }
            cohen_d: { type: number }
            sample_n: { type: integer }
            l1_l2_pair: { type: string }

        source:
          type: string
          pattern: "^.+, (ch|pp\\.) .+$"
          description: 'Format: "Author Year, ch X, pp. Y-Z"'

        confidence:
          enum: [high, medium, low]
          description: "high = direct quote or table; medium = paraphrase; low = inferred"

  counterbalanced_principle:
    type: object
    description: "Optional — Lyster's counterbalanced approach principle if present in source"
    properties:
      rule: { type: string }
      conditions: { type: array, items: { type: string } }
      source: { type: string }
