# L1 transfer patterns: French → English.
# Each entry: family, multiplier (priority weight), description.
# Multiplier = priority weight for ranking (higher = show first to LLM).
l1: fr
target: en
transfers:
  - family: articles
    multiplier: 1.5
    description: "Surutilisation 'the' (the love → love), omission 'a/an' (I am student → I am a student)."
  - family: prepositions
    multiplier: 1.4
    description: "'I think to it' (calque 'à') → 'I think about it'. 'on the train' vs 'in the train'."
  - family: false_friends
    multiplier: 1.3
    description: "actually ≠ actuellement (currently); library ≠ librairie (bookshop); to assist ≠ assister."
  - family: modals
    multiplier: 1.2
    description: "'I should to go' (calque 'devoir') → 'I should go'."
  - family: word_order_questions
    multiplier: 1.1
    description: "'What you want?' (calque) → 'What do you want?'."
