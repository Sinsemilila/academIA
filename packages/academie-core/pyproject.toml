[build-system]
requires = ["setuptools>=69", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "academie-core"
version = "0.1.0"
description = "AcademIA shared pedagogy + taxonomy + psychometrics core (Sprint 4 ADR-004)"
readme = "README.md"
requires-python = ">=3.11"
license = { text = "Proprietary" }
authors = [{ name = "Sinsemilila" }]
dependencies = [
    "pyyaml>=6.0",
    "pydantic>=2.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-cov>=5.0",
    "hypothesis>=6.0",
    "mypy>=1.8",
]

[tool.setuptools.packages.find]
where = ["."]
include = ["academie_core*"]

[tool.setuptools.package-data]
academie_core = ["data/**/*.yaml", "data/**/*.yml"]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = "test_*.py"
addopts = "-q --tb=short"
