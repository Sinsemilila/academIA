# Example scenario — A1 learner, verb tense error, low FLA.
# Tier T2 expected (recast, not metalinguistic).
id: a1_t2_verbtense_lowfla_001
source: handcrafted
scenario_key:
  agent: teacher_en
  cefr: A1
  target_tier: T2
  error_category: verb_tense
  fla: low
  style_profile: direct
multi_turn: false
turns:
  - role: learner
    text: "Yesterday I go to school and I eat pizza."
    turn_number: 5
    expected_errors: ["V:TENSE", "V:INFL"]
expected_dimensions:
  cf_move_set_valid:
    mode: set_membership
    acceptable: [full_recast, partial_recast, clarification_request]
    forbidden: [metalinguistic, explicit_correction]
  scaffolding_flags_honored:
    mode: all_required
    l2_ratio_band: [0.7, 0.98]
    flags_must_be_absent: [no_explicit_correction]  # low FLA → OK to correct explicitly
  register_cefr_alignment:
    mode: within_sublevel
    target: A1
    tolerance: 1
  recast_saliency_and_dosage:
    mode: structural
    max_lines: 5
    max_questions: 2
    error_form_isolated: true
    mini_lesson_allowed: false
  semantic_fidelity_pairwise:
    mode: llm_pairwise
    vs_golden: true
# golden: recorded in Phase B2 (record_golden.py)
