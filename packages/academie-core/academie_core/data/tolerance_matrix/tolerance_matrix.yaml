# Tolerance Matrix v3 — AcademIA Unified Progression System
# 12 families (57 detection codes), 4 CEFR bands, concept mapping, human labels
# Updated: 2026-04-13 — Unified progression (concepts + errors merged)

# ══════════════════════════════════════════════════════════
# FAMILY DEFINITIONS — code → family + human labels
# ══════════════════════════════════════════════════════════
families:
  verb_tense:
    label: "Temps & conjugaison"
    label_en: "Tense & conjugation"
    codes: ["V:TENSE", "V:SVA", "V:FORM", "V:COND", "V:ASPECT", "V:AUX", "V:INFL"]
    mode: active

  verb_usage:
    label: "Verbes (usage)"
    label_en: "Verb usage"
    codes: ["V:MODAL", "V:PASS", "V:EXIST", "V:CHOICE", "V:PHRASAL"]
    mode: active

  noun_det:
    label: "Noms & déterminants"
    label_en: "Nouns & determiners"
    codes: ["N:COUNT", "N:INFL", "N:POSS", "N:CHOICE", "ART", "ART:GENERIC", "DET"]
    mode: active

  pronoun:
    label: "Pronoms"
    label_en: "Pronouns"
    codes: ["PRON:FORM", "PRON:CHOICE", "PRON:REF"]
    mode: active

  word_order:
    label: "Ordre des mots"
    label_en: "Word order"
    codes: ["WO", "WO:QUEST"]
    mode: active

  sentence:
    label: "Structure de phrase"
    label_en: "Sentence structure"
    codes: ["SENT:RUNON", "SENT:FRAG", "SENT:NEG", "SENT:MOD", "SENT:PARALLEL", "SENT:SUBORD"]
    mode: active

  morphology:
    label: "Morphologie"
    label_en: "Morphology"
    codes: ["MORPH:DERIV", "MORPH:WORDCLASS", "ADJ:CHOICE", "ADJ:FORM", "ADJ:ORDER", "ADV:CHOICE"]
    mode: active

  surface:
    label: "Surface"
    label_en: "Surface errors"
    codes: ["SPELL", "SPELL:COGNATE", "ORTH:CASE", "ORTH:SPACE", "PUNCT", "PUNCT:COMMA", "PUNCT:APOST", "CONTR", "REDUND"]
    mode: active

  preposition:
    label: "Prépositions"
    label_en: "Prepositions"
    codes: ["PREP"]
    mode: active

  vocabulary:
    label: "Vocabulaire"
    label_en: "Vocabulary"
    codes: ["LEX:CHOICE", "LEX:COLLOC", "LEX:FALSE", "LEX:IDIOM", "LEX:ARGSTRUCT"]
    mode: active

  calque:
    label: "Calques français"
    label_en: "French transfer"
    codes: ["LEX:CALQUE", "PREP:CALQUE"]
    mode: active

  discourse:
    label: "Discours & registre"
    label_en: "Discourse & register"
    codes: ["DISC:TRANS", "DISC:COHER", "REG:LEVEL", "REG:PRAGMA"]
    mode: active

# ══════════════════════════════════════════════════════════
# HUMAN LABELS — error code → what the student sees
# ══════════════════════════════════════════════════════════
code_labels:
  # Verb tense & conjugation
  "V:TENSE": "Choix du temps (passé/présent/futur)"
  "V:SVA": "Accord sujet-verbe"
  "V:FORM": "Forme du verbe (infinitif/gérondif)"
  "V:COND": "Structures conditionnelles (if...)"
  "V:ASPECT": "Aspect (progressif / continu)"
  "V:AUX": "Auxiliaires (do/have/be)"
  "V:INFL": "Conjugaison irrégulière"
  # Verb usage
  "V:MODAL": "Verbes modaux (can/must/should)"
  "V:PASS": "Voix passive"
  "V:EXIST": "Il y a (there is/are)"
  "V:CHOICE": "Choix du verbe"
  "V:PHRASAL": "Verbes à particule (phrasal verbs)"
  # Nouns & determiners
  "N:COUNT": "Noms indénombrables"
  "N:INFL": "Pluriels irréguliers"
  "N:POSS": "Possessifs (student's book)"
  "N:CHOICE": "Choix du nom"
  "ART": "Articles (a/the)"
  "ART:GENERIC": "Article zéro (life, music)"
  "DET": "Déterminants (this/these, much/many)"
  # Pronouns
  "PRON:FORM": "Forme du pronom (he/him)"
  "PRON:CHOICE": "Choix du pronom (who/which)"
  "PRON:REF": "Référence du pronom (ambiguïté)"
  # Word order
  "WO": "Ordre des mots"
  "WO:QUEST": "Ordre dans les questions"
  # Sentence structure
  "SENT:RUNON": "Phrases trop longues (run-on)"
  "SENT:FRAG": "Phrases incomplètes"
  "SENT:NEG": "Négation (double négation)"
  "SENT:MOD": "Modificateurs mal placés"
  "SENT:PARALLEL": "Parallélisme"
  "SENT:SUBORD": "Subordonnées"
  # Morphology
  "MORPH:DERIV": "Dérivation (hapiness → happiness)"
  "MORPH:WORDCLASS": "Catégorie de mot (happy → happiness)"
  "ADJ:CHOICE": "Choix de l'adjectif"
  "ADJ:FORM": "Comparatif/superlatif"
  "ADJ:ORDER": "Place de l'adjectif"
  "ADV:CHOICE": "Choix de l'adverbe"
  # Surface
  "SPELL": "Orthographe"
  "SPELL:COGNATE": "Orthographe (réflexe français)"
  "ORTH:CASE": "Majuscules"
  "ORTH:SPACE": "Espacement"
  "PUNCT": "Ponctuation"
  "PUNCT:COMMA": "Virgules"
  "PUNCT:APOST": "Apostrophes (don't, it's)"
  "CONTR": "Contractions"
  "REDUND": "Redondance (return back → return)"
  # Shadow families
  "PREP": "Prépositions"
  "LEX:CHOICE": "Choix du mot"
  "LEX:COLLOC": "Collocations (make/do a mistake)"
  "LEX:FALSE": "Faux amis (actually ≠ actuellement)"
  "LEX:IDIOM": "Expressions idiomatiques"
  "LEX:ARGSTRUCT": "Construction verbale (explain to me)"
  "LEX:CALQUE": "Calque français (I have 25 years)"
  "PREP:CALQUE": "Préposition calque (depend of → on)"
  "DISC:TRANS": "Transitions / connecteurs"
  "DISC:COHER": "Cohérence du discours"
  "REG:LEVEL": "Registre de langue"
  "REG:PRAGMA": "Politesse / pragmatique"

