name: security-audit

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 5 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  pip-audit:
    name: pip-audit (Python deps)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Audit webapp/backend
        run: pip-audit -r webapp/backend/requirements.txt --strict
        continue-on-error: false

      - name: Audit packages/academie-core
        run: |
          if [ -f packages/academie-core/pyproject.toml ]; then
            pip-audit packages/academie-core --strict
          fi
        continue-on-error: true

  npm-audit:
    name: npm audit (JS deps)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: webapp/frontend
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: webapp/frontend/package-lock.json

      - name: npm audit (high+ blocking)
        run: npm audit --audit-level=high
        continue-on-error: false

  sbom:
    name: SBOM generation (syft)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install syft
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin

      - name: Generate SBOM (CycloneDX JSON)
        run: |
          syft dir:. -o cyclonedx-json=sbom.cyclonedx.json
          syft dir:. -o spdx-json=sbom.spdx.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v7
        with:
          name: sbom
          path: |
            sbom.cyclonedx.json
            sbom.spdx.json
          retention-days: 90

  trivy-fs:
    name: Trivy filesystem scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true
          skip-dirs: node_modules,.venv,__pycache__
