# Concept hint map — Spanish (ES).
# DRAFT — sourced from PCIC. Requires native-speaker review for pedagogical accuracy.
# Format : concept_key (stable ID, kebab/snake case) → short Spanish hint with example.
# Mirrors en.yaml pattern. concept_keys aligned with curriculum_es.yaml + rules_es.py.

# === A1 ===
genero_masculino_femenino: "el/la + concordancia adj (el libro rojo / la mesa roja)"
ser_estar_basico: "ser = identidad/nacionalidad, estar = estado/ubicación (soy francés / estoy cansado)"
presente_indicativo_regular: "-ar (hablo), -er (como), -ir (vivo) — 6 personas"
articulos_definidos: "el/la/los/las — concordancia con el sustantivo"
hay_vs_esta: "hay = existencia indefinida (hay un libro), está = localización de algo conocido (el libro está aquí)"
tener_que: "obligación simple — tengo que estudiar"

# === A2 ===
preterito_indefinido: "acción terminada en pasado concreto (ayer, la semana pasada) — hablé, comí, viví"
preterito_perfecto: "acción pasada con conexión al presente (hoy, esta semana) — he hablado"
gustar_type: "verbo con pronombre OI — me gusta / te gustan (concordancia avec sujet logique ≠ FR)"
imperativo_afirmativo_tu: "¡habla! ¡come! ¡vive! — 2e pers sing, utilisé pour instruction"
comparativos: "más/menos + adj + que / tan + adj + como (más alto que / tan alto como)"
futuro_ir_a: "acción future proche — voy a estudiar mañana"

# === B1 ===
imperfecto_vs_indefinido: "imperfecto = descripción/hábito passé (comía), indefinido = événement concret (comí ayer)"
subjuntivo_presente: "après expressions volonté/émotion/doute — quiero que vengas, me alegra que estés aquí"
subjuntivo_temporal: "après cuando/en cuanto/hasta que + référence au FUTUR — cuando venga (subj), cuando viene (ind habituel)"
condicional_simple: "-ía endings pour hypothèse/politesse — estudiaría, podría, me gustaría"
por_para: "por = cause/moyen/durée/échange (gracias por, viajar por tren), para = but/destinataire/délai (para ti, para mañana)"
estilo_indirecto_basico: "cambio de persona + tiempo — dice: 'estoy bien' → dice que está bien"
verbos_preposicion: "soñar CON, consistir EN, acordarse DE — prépositions obligatoires, souvent ≠ FR"

# === B2 ===
condicional_compuesto: "habría + participio — hypothèse irréalisable passée (habría ido si hubiera podido)"
subjuntivo_imperfecto: "-ara/-iera — après si hypothétique présent (si tuviera tiempo), wish pasado (ojalá tuviera)"
subjuntivo_pluscuamperfecto: "hubiera + participio — si hypothétique passé (si hubiera sabido)"
pasiva_refleja: "se + verbe 3e pers — se venden libros (livres sont vendus), alternative à la passive"
aunque_modo: "aunque + ind = fait reconnu, + subj = concession hypothétique (aunque llueve / aunque llueva)"
conectores_argumentativos: "sin embargo, no obstante, por lo tanto, a pesar de que — registre élevé"

# === C1 ===
colocaciones_avanzadas: "hacer/dar/tomar + nom spécifique (hacer caso, dar pena, tomar cariño)"
registros_formal_informal: "choix tú/usted, lexique (amigo/colega/tío), inversions (Ruego que…)"
modismos: "expressions idiomatiques (meter la pata, estar en las nubes, ponerse las pilas)"
inversion_enfatica: "Poco esperaba yo…, Raro es que…, No sin razón…"
subjuntivo_estilo: "valor estilístico du subjonctif après certains verbes de pensée/perception"

# === C2 ===
estructuras_hendidas: "Fue Juan quien lo hizo / Lo que necesito es descansar"
discurso_referido_complejo: "transposition temporelle + modale + pragmatique"
ironia_pragmatica: "signaux prosodiques + lexique contraire + context partagé"
matiz_perfectivo_imperfectivo: "visión aspectual fine (estaba haciendo vs hacía vs hizo)"

# ============================================================================
# === Phase C4 PCIC audit additions (Session 53 — 2026-04-30) ================
# 50+ entries from PCIC A1-B2 Gramática extraction (extracted/cervantes-2006-*) 
# ============================================================================
ser_identificativo_a1: "ser identificativo (Soy Elena, Es él) — identidad/nombre/identificación pronominal"
ser_pertenencia_clase_a1: "ser pertenencia clase : nacionalidad/profesión/ideología/materia (Soy español, Soy estudiante)"
ser_localizacion_temporal_a1: "ser localización temporal (Es lunes, Son las tres) — fechas/horas/eventos"
estar_localizacion_espacial_a1: "estar localización espacial (Está aquí, Está en Madrid)"
estar_modo_bien_mal_a1: "estar + adverbios modo (Está bien/mal) ; criterio distribucional"
ser_estar_contraste_a1: "ser/estar contraste pédagogique (mémoriser : SER = identidad clase, ESTAR = estado/lugar)"
demostrativos_a1: "este/ese/aquel (proche/lointain) + neutros esto/eso/aquello"
posesivos_atonos_a1: "mi/tu/su/nuestro/vuestro (átonos prenominales)"
pronombres_oi_me_te_le_a1: "me/te/le pronombres OI (Me gusta el cine) — experimentante semántico"
relativo_que_a1: "que relativo especificativo con antecedente expreso (El libro que lee es interesante)"
interrogativos_qué_quién_a1: "qué/quién/cuánto/dónde/cómo : posición inicial, invariables (excepto cuánto)"
exclamativos_qué_a1: "¡Qué bonito! ¡Qué bien! — qué + adj/adv/copulativo+atributo"
numerales_cardinales_a1: "1-100+ : variación género (un/una, doscientos/doscientas) ; cien/ciento"
numerales_ordinales_10_a1: "primero/segundo/tercero...décimo + apocopaciones (primer/tercer ante masc sing)"
articulo_definido_anaforico_a2: "artículo definido anafórico (segunda mención) + posesión inalienable (Me duele la cabeza) + genérico (Leo el periódico)"
numerales_universal_todo_a2: "todo/a/os/as + det (todos los días) ; expresiones invariables (todo seguido, todo recto)"
cuantificadores_negativos_nada_nadie_a2: "nada/nadie aislados (¿Qué has comprado? Nada) ; con polaridad negativa"
comparativos_mas_menos_tan_a2: "más/menos/tan + adj/adv/sustantivo + que/como (Soy más alto que tú, tan alto como)"
verbos_meteorologicos_a2: "verbos meteorológicos impersonales (llueve, nieva, hace frío/calor)"
od_persona_con_a_a2: "OD persona con preposición a (Hoy he visto a Almudena, Conozco a María)"
subjuntivo_volicion_b1: "subjuntivo après volonté/désir : querer que, desear que, pedir que, esperar que (Quiero que vengas)"
subjuntivo_emocion_b1: "subjuntivo après émotion : me gusta/encanta/da miedo/molesta/pone triste que (Me alegra que estés)"
subjuntivo_duda_b1: "subjuntivo après duda/négation creencia : no creo que, dudo que, no es cierto que (No creo que estés bien)"
subjuntivo_valoracion_b1: "subjuntivo construcciones impersonales valorativas : es bueno/malo/importante/extraño que (Es bueno que estudies)"
subjuntivo_temporal_futuro_b1: "subjuntivo après cuando + futuro (Cuando llegues), antes de que/después de que/hasta que/en cuanto/tan pronto como"
subjuntivo_finalidad_b1: "subjuntivo après para que/a que (Te lo doy para que lo uses, He venido a que me solucionen)"
por_causa_medio_duracion_b1: "por : causa (gracias por), medio (por correo), duración (por la mañana), intercambio (por dos euros), agente pasiva (por Cervantes)"
para_finalidad_destino_plazo_b1: "para : finalidad (para estudiar), destinatario (para ti), plazo (para mañana), opinión (para mí), dirección (salgo para Madrid)"
condicional_cortesia_b1: "condicional simple cortesía (¿Podría hablar contigo? ¿Te importaría...?) — ≠ FR conditionnel"
condicional_modestia_sugerencia_b1: "condicional modestia (Yo diría que...) + sugerencia (Deberías acostarte)"
pronominales_combinacion_b1: "combinación clíticos OI+OD : Se lo doy (le → se ante lo/la/los/las), Te lo dije"
relativo_que_quien_b1: "que (sin restriction +/-humano) vs quien (+humano, registre soutenu) — la profesora que/a quien tengo"
relativo_donde_cuando_como_b1: "adverbios relativos donde (lugar), cuando (tiempo), como (modo) — Allí donde voy, Cuando llegó, Como dijiste"
interrogativo_cual_b1: "cuál/cuáles : pregunta sobre élément spécifique parmi un ensemble (¿Cuál te gusta más?) ≠ qué (génerique)"
imperfecto_descriptivo_continuidad_b1: "imperfecto descriptivo + continuidad : acción interrumpida (Iba por la calle y me encontré), conato (Iba a salir cuando)"
estilo_indirecto_b1: "estilo indirecto : reculer un temps (presente→imperfecto, indefinido→pluscuamperfecto, futuro→condicional) + cambio pronombres + ajustes deícticos"
pasiva_refleja_se_b1: "pasiva refleja con se + verbo 3ª pers (Se venden libros, Se habla español aquí)"
aunque_concesivo_factual_b1: "aunque + indicativo (concession factuelle) — Aunque me encuentro mal, voy al trabajo"
conectores_causales_b2: "causales : porque, ya que, puesto que, dado que, debido a (Lo hizo porque tenía hambre)"
conectores_consecutivos_b2: "consecutivos : así que, por lo tanto, por consiguiente, en consecuencia (Tengo trabajo, así que no salgo)"
conectores_concesivos_b2: "concesivos : aunque, a pesar de (que), pese a (que), si bien (Aunque está lloviendo, voy a correr)"
conectores_finales_b2: "finales : para que, a fin de que, con el objetivo de (Te lo doy para que lo uses)"
conectores_temporales_avanzados_b2: "temporales avanzados : una vez que, en cuanto, tan pronto como, apenas, nada más + inf (Apenas llegué, comenzó a llover)"
conectores_contraargumentativos_b2: "contraargumentativos : sin embargo, no obstante, en cambio, por el contrario, sino (No es antipático sino tímido)"
verbos_cambio_ponerse_volverse_quedarse_hacerse_b2: "verbos de cambio (seudocopulativos) : ponerse + adj transitorio (Se puso pálido), volverse + adj duradero (Se volvió vegetariano), quedarse + estado resultante (Se quedó solo), hacerse + adquisición voluntaria (Se hizo abogado), convertirse en + transformación radical"
pasiva_perifrastica_b2: "pasiva perifrástica ser + participio (Las puertas fueron abiertas, La obra será expuesta) — sujeto definido obligatorio, contraste avec pasiva refleja B1"
subjuntivo_imperfecto_cortesia_b2: "subjuntivo imperfecto cortesía registres élevés (Quisiera ver ese abrigo) ≠ querría"
subjuntivo_irrealizacion_pasado_b2: "subjuntivo imperfecto desiderativas pasadas/irrealización (Ojalá hubiera estudiado más, Ojalá tuviera suerte ayer)"
relativos_el_que_la_que_explicativas_b2: "el/la/los/las que avec préposition (Los chicos de los que te hablé) + sans antécédent (El que asistió ayer)"
relativos_quien_explicativas_b2: "quien explicativas (Yo, que soy su mejor amigo, lo sé) + sans antécédent (Quien viene es Juan)"
dubitativas_quizá_posiblemente_b2: "dubitativas : quizá/tal vez/posiblemente + subjuntivo (Quizá tengas razón) ; a lo mejor + indicativo (A lo mejor viene)"
regional_voseo_tuteo_vosotros_b2: "awareness regional : voseo (vos sos, vos tenés - Río Plata), tuteo (tú/usted formal-Mexique), vosotros (Espagne - 2ª pers pl) — PCIC default panhispánico"

# === Stubs pour concept_keys héritées sans hint (S53 patch) ===
numeros_fechas: "1-100, ordinaux 1°-10° avec apocopaciones (primer, tercer ante m.sing). Dates : el 15 de mayo de 2026, hoy es lunes"
saludos_presentaciones: "Hola/Buenos días/Buenas tardes/Buenas noches ; Mucho gusto / Encantado/a ; Soy + nom / Me llamo + nom"
pronombres_sujeto: "yo, tú, él, ella, usted (sing), nosotros/as, vosotros/as (Espagne)/ustedes (Latam+formel), ellos/as. Souvent omis (pro-drop) ≠ EN/FR"
pronombres_objeto_directo: "me, te, lo/la, nos, os, los/las (átonos antéposés au verbe conjugué) — Lo conozco, La compré (≠ FR le/la postposés)"
pronombres_indirectos: "me, te, le, nos, os, les + reduplication 'a + tonique' obligatoire avec gustar/encantar (A mí me gusta) ; le/les → se ante lo/la (Se lo doy)"
pronombres_reflexivos: "me, te, se, nos, os, se — verbos pronominales (levantarse, ducharse, acostarse) + reflexivo proprement dit (me veo en el espejo)"
verbos_pronominales: "verbos pronominales avec différence sémantique : ir/irse (aller/partir), dormir/dormirse (dormir/s'endormir), llevar/llevarse (porter/emporter)"
articulos_indefinidos: "un, una, unos, unas — concordance genre/nombre. Premier mention (Tengo un libro). Incompatible avec gustar/haber/predicate clarity"
adverbios_frecuencia: "siempre/normalmente/a menudo/a veces/raramente/nunca — devant verbe principal, derrière ser/estar (Estoy siempre cansado)"
conectores_temporales_basicos: "primero, luego, después, entonces, mientras, antes, ahora, hoy, ayer, mañana — séquence temporelle simple"
marcadores_discursivos_b1: "bueno, claro, vale, oye, mira, pues — marqueurs conversationnels B1 introductifs/réactifs"
estilo_indirecto_avanzado: "transposition complète : modaux (debería→tendría que), pluscuamperfecto, ajustes deícticos lieu (aquí→allí, este→aquel) + temps (ayer→el día anterior)"
colocaciones_b2: "colocaciones léxicas frecuentes : tomar una decisión, hacer caso, prestar atención, dar miedo/pena/asco, echar de menos, tener en cuenta"
marcadores_discursivos_c1: "marcadores avancés : por consiguiente, no obstante, en cuanto a, a propósito, en definitiva, dicho esto — registre soutenu"
lexico_preciso: "vocabulario preciso C1 : matiz semántico (caminar/pasear/deambular), registre élevé, synonymie nuancée"
literatura_referencial: "alusiones culturelles/littéraires partagées (Don Quijote, Cervantes, Lorca, García Márquez, Borges) sans explication"
construcciones_focales: "estructuras focales C1 : Lo que necesito es..., Es Juan quien..., En cuanto a X..., Por lo que respecta a... — focalización stylistique"
