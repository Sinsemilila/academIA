# Tolerance Matrix v2 — AcademIA Error Taxonomy
# 12 families (57 detection codes grouped), 4 CEFR bands, 3 tiers
# Updated: 2026-04-13 — Design v3 post research + challenge
#
# Tiers: ignored (0.0) | noted (0.3) | penalized (0.8)
# Bands: beginner (A1-A2) | intermediate (B1) | upper (B2) | advanced (C1-C2)
# Shadow: detected by LLM but not displayed to student (F1 < 65%)

# ══════════════════════════════════════════════════════════
# FAMILY DEFINITIONS — code → family mapping
# ══════════════════════════════════════════════════════════
families:
  verb_tense:
    label: "Temps & conjugaison"
    label_en: "Tense & conjugation"
    codes: ["V:TENSE", "V:SVA", "V:FORM", "V:COND", "V:ASPECT", "V:AUX", "V:INFL"]
    mode: active

  verb_usage:
    label: "Verbes (usage)"
    label_en: "Verb usage"
    codes: ["V:MODAL", "V:PASS", "V:EXIST", "V:CHOICE", "V:PHRASAL"]
    mode: active

  noun_det:
    label: "Noms & déterminants"
    label_en: "Nouns & determiners"
    codes: ["N:COUNT", "N:INFL", "N:POSS", "N:CHOICE", "ART", "ART:GENERIC", "DET"]
    mode: active

  pronoun:
    label: "Pronoms"
    label_en: "Pronouns"
    codes: ["PRON:FORM", "PRON:CHOICE", "PRON:REF"]
    mode: active

  word_order:
    label: "Ordre des mots"
    label_en: "Word order"
    codes: ["WO", "WO:QUEST"]
    mode: active

  sentence:
    label: "Structure de phrase"
    label_en: "Sentence structure"
    codes: ["SENT:RUNON", "SENT:FRAG", "SENT:NEG", "SENT:MOD", "SENT:PARALLEL", "SENT:SUBORD"]
    mode: active

  morphology:
    label: "Morphologie"
    label_en: "Morphology"
    codes: ["MORPH:DERIV", "MORPH:WORDCLASS", "ADJ:CHOICE", "ADJ:FORM", "ADJ:ORDER", "ADV:CHOICE"]
    mode: active

  surface:
    label: "Surface"
    label_en: "Surface errors"
    codes: ["SPELL", "SPELL:COGNATE", "ORTH:CASE", "ORTH:SPACE", "PUNCT", "PUNCT:COMMA", "PUNCT:APOST", "CONTR", "REDUND"]
    mode: active

  preposition:
    label: "Prépositions"
    label_en: "Prepositions"
    codes: ["PREP"]
    mode: shadow

  vocabulary:
    label: "Vocabulaire"
    label_en: "Vocabulary"
    codes: ["LEX:CHOICE", "LEX:COLLOC", "LEX:FALSE", "LEX:IDIOM", "LEX:ARGSTRUCT"]
    mode: shadow

  calque:
    label: "Calques français"
    label_en: "French transfer"
    codes: ["LEX:CALQUE", "PREP:CALQUE"]
    mode: shadow

  discourse:
    label: "Discours & registre"
    label_en: "Discourse & register"
    codes: ["DISC:TRANS", "DISC:COHER", "REG:LEVEL", "REG:PRAGMA"]
    mode: shadow

# ══════════════════════════════════════════════════════════
# TOLERANCE MATRIX — family × band → tier
# ══════════════════════════════════════════════════════════
matrix:
  verb_tense:   { beginner: ignored,  intermediate: noted,     upper: penalized, advanced: penalized }
  verb_usage:   { beginner: ignored,  intermediate: noted,     upper: noted,     advanced: penalized }
  noun_det:     { beginner: ignored,  intermediate: noted,     upper: noted,     advanced: penalized }
  pronoun:      { beginner: ignored,  intermediate: noted,     upper: noted,     advanced: penalized }
  word_order:   { beginner: ignored,  intermediate: noted,     upper: penalized, advanced: penalized }
  sentence:     { beginner: ignored,  intermediate: ignored,   upper: noted,     advanced: penalized }
  morphology:   { beginner: ignored,  intermediate: ignored,   upper: noted,     advanced: penalized }
  surface:      { beginner: ignored,  intermediate: ignored,   upper: noted,     advanced: penalized }
  # Shadow families — detected but not displayed
  preposition:  { beginner: shadow,   intermediate: shadow,    upper: shadow,    advanced: shadow    }
  vocabulary:   { beginner: shadow,   intermediate: shadow,    upper: shadow,    advanced: shadow    }
  calque:       { beginner: shadow,   intermediate: shadow,    upper: shadow,    advanced: shadow    }
  discourse:    { beginner: shadow,   intermediate: shadow,    upper: shadow,    advanced: shadow    }

# ══════════════════════════════════════════════════════════
# TIER WEIGHTS — for scoring
# ══════════════════════════════════════════════════════════
weights:
  ignored: 0.0
  noted: 0.3
  penalized: 0.8
  shadow: 0.0

# ══════════════════════════════════════════════════════════
# CEFR → BAND MAPPING
# ══════════════════════════════════════════════════════════
cefr_bands:
  A1: beginner
  A2: beginner
  B1: intermediate
  B2: upper
  C1: advanced
  C2: advanced

# ══════════════════════════════════════════════════════════
# USER-FACING LABELS
# ══════════════════════════════════════════════════════════
feedback_labels:
  penalized:
    fr: "Priorité haute"
    en: "High priority"
    color: "red"
  noted:
    fr: "À travailler"
    en: "Work on this"
    color: "orange"
  ignored:
    fr: "Normal pour ton niveau"
    en: "Normal for your level"
    color: "gray"

# Max errors counted per sentence (cap to avoid discouraging)
max_errors_per_turn: 3
